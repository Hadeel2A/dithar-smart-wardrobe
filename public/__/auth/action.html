<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>معالجة الطلب…</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body{margin:0;display:grid;place-items:center;height:100vh;font-family:system-ui,Tahoma,Arial;background:#F9F7F3;color:#2F3A2F}
    .c{background:#fff;border:1px solid #eee;border-radius:16px;padding:24px 20px;box-shadow:0 10px 24px rgba(0,0,0,.06);text-align:center;width:min(92vw,440px)}
    a{display:inline-block;margin-top:10px;padding:10px 16px;border-radius:10px;background:linear-gradient(90deg,#7B8C68,#9DAE8C);color:#fff;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <div class="c">
    <h3>جارٍ فتح الصفحة المطلوبة…</h3>
    <p>سيتم تحويلك لإتمام إعادة التعيين.</p>
    <a id="btn" href="#">متابعة الآن</a>
  </div>

  <script>
    var qs = location.search || "";
    var target = "/reset" + qs;   // → يفتح reset.html مباشرة مع نفس الاستعلامات
    document.getElementById("btn").href = target;
    setTimeout(function(){ location.href = target; }, 600);
  </script>
</body>
</html>
